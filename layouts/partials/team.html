{{ $locale := .Site.Params.locale | default "en" }}
{{ $t := index .Site.Data.sitetext $locale }}

<!-- Team -->
<section class="page-section" id="{{ $t.team.section | default "team" }}">
  <div class="container">
    <div class="row">
      <div class="col-lg-12 text-center">
        <h2 class="section-heading text-uppercase">{{ $t.team.title }}</h2>
        <h3 class="section-subheading text-muted">{{ $t.team.text }}</h3>
      </div>
    </div>
    <div class="row d-flex justify-content-center">
      {{ range $t.team.people }}
      <div class="col-sm-4">
        <div class="team-member">
          <img class="mx-auto rounded-circle" src="{{ .image }}" alt="">
          <h4>{{ .name }}</h4>
          <p class="text-muted">{{ .role }}</p>
          <ul class="list-inline social-buttons">
            {{ range .social }}
            <li class="list-inline-item">
              <a href="{{ .url }}">
                <i class="{{ .icon }}"></i>
              </a>
            </li>
            {{ end }}
          </ul>
        </div>
      </div>
      {{ end }}
    </div>
    <div class="row">
      <div class="col-lg-8 mx-auto text-center">
        <div class="large text-muted">{{ $t.team.subtext | markdownify }}</div>
      </div>
    </div>
  </div>
</section>
<!-- End Team -->
