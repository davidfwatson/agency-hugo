{{ $locale := .Site.Params.locale | default "en" }}
{{ $t := index .Site.Data.sitetext $locale }}

<!-- About -->
<section class="page-section" id="{{ $t.about.section | default "about" }}">
  <div class="container">
    <div class="row">
      <div class="col-lg-12 text-center">
        <h2 class="section-heading text-uppercase">{{ $t.about.title | default "About Us" }}</h2>
        <h3 class="section-subheading text-muted">{{ $t.about.text | default "" }}</h3>
      </div>
    </div>
    <div class="row">
      <div class="col-lg-8 mx-auto text-center">
        <div class="large text-muted">{{ $t.about.body | markdownify }}</div>
      </div>
    </div>
  </div>
</section>
<!-- End About -->
